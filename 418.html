<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 418: I'm a teapot - warudora</title>
    <style>
        /* 既存サイトの爽やかなブルーと濃紺ベースのデザインを継承 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* サイト上部のグラデーション感を背景に薄く演出 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(135deg, #1b2a4a 0%, #2980b9 100%);
            z-index: -1;
        }

        /* サイトの美しいカード型コンポーネントを再現 */
        .card {
            background: #ffffff;
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            box-sizing: border-box;
        }

        /* 404ページ(IMG_1385.jpeg)のような太くスタイリッシュな数字 */
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            color: #2980b9;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1b2a4a;
            margin: 10px 0 30px 0;
        }

        /* ティーポットエリア */
        .teapot-container {
            position: relative;
            display: inline-block;
            margin: 40px 0;
            cursor: pointer;
        }

        .teapot {
            font-size: 7rem;
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        /* ホバーで少し弾む */
        .teapot:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* クリック時の激しいブルブル */
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-3deg); }
            40% { transform: translate(-3px, 0px) rotate(3deg); }
            60% { transform: translate(2px, 2px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(2deg); }
            100% { transform: translate(1px, 2px) rotate(-1deg); }
        }
        .shaking {
            animation: shake 0.3s infinite;
        }

        /* warudora風の綺麗な吹き出し */
        .bubble {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: #1b2a4a;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #1b2a4a transparent transparent transparent;
        }
        .bubble.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .description {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.7;
            color: #555;
            margin-bottom: 35px;
        }

        /* 既存の綺麗なボタンデザインを完全再現 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            width: 85%;
            padding: 14px 0;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            box-sizing: border-box;
        }

        /* 既存のメインボタン（爽やかな水色グラデ） */
        .btn-primary {
            background: linear-gradient(90deg, #4fc3f7 0%, #29b6f6 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(41, 182, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(41, 182, 246, 0.6);
        }

        /* お遊び用のサブボタン（シックなグレー） */
        .btn-secondary {
            background-color: #e0e6ed;
            color: #606f7b;
        }
        .btn-secondary:hover {
            background-color: #d1d9e2;
            color: #3d4852;
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="card">
    <h1 class="error-code">418</h1>
    <div class="error-title">I'm a teapot.</div>
    
    <div class="teapot-container" onclick="talkTeapot()">
        <div class="bubble" id="quoteBubble">は？コーヒー？寝ぼけてんの？</div>
        <div class="teapot" id="teapotIcon">🫖</div>
    </div>

    <p class="description">
        おっと！道に迷った上に、<br>
        コーヒーを要求されてしまったようだ。<br>
        残念ながら、私は<b>ティーポット</b>です。<br>
        いくらコードを書いてもコーヒーは淹れられません。
    </p>

    <div class="btn-group">
        <!-- 既存サイトの「トップページへ戻る」と同じデザイン -->
        <a href="/" class="btn btn-primary">トップページへ戻る</a>
        <button class="btn btn-secondary" onclick="demandCoffee()">それでもコーヒーを要求する</button>
    </div>
</div>

<script>
    // warudoraくんの活動（Mod開発、IRIAM配信、システム構築）に合わせた限定セリフ
    const quotes = [
        "は？コーヒー？寝ぼけてんの？",
        "Modでコーヒー追加しても、私はティーポットだよ？",
        "soundjsonでコーヒーの音作っても出ません！",
        "配信中にコーヒーこぼしたら大変でしょ！麦茶にしな！",
        "駅名標エディターで「ティーポット前駅」作るぞ？",
        "JavaでもPythonでも、私からコーヒーは抽出できません。",
        "大人しく紅茶か緑茶を飲んで待っててください。"
    ];
    let currentIdx = 0;
    let isClickable = true;

    function talkTeapot() {
        if (!isClickable) return;
        isClickable = false;

        const teapot = document.getElementById('teapotIcon');
        const bubble = document.getElementById('quoteBubble');

        // セリフセット
        bubble.innerText = quotes[currentIdx];
        currentIdx = (currentIdx + 1) % quotes.length;

        // アニメーション発火
        bubble.classList.add('show');
        teapot.classList.add('shaking');

        setTimeout(() => {
            bubble.classList.remove('show');
            teapot.classList.remove('shaking');
            isClickable = true;
        }, 1800);
    }

    function demandCoffee() {
        // コンソールに本物のエンジニアライクな418エラーを出す
        console.error("🚨 HTTP 418 Error: [HTCPCP] The machine is a teapot. Cannot fulfill the request 'BREW COFFEE'.");
        
        alert("🚨 サーバー（ティーポット）からの応答 🚨\n\n「しつこい！規約違反（RFC 2324）です！\n今日の配信の歌枠で、1曲目が強制的に『おさかな天国』になります」");
    }
</script>

</body>
</html>
